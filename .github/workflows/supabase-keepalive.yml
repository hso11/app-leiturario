name: Supabase keepalive

on:
  schedule:
    # A cada 3 dias, bem dentro da janela de auto-pause de 7 dias do plano free do Supabase
    - cron: '0 12 */3 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase (auth health)
        run: |
          # /auth/v1/health responde 200 sem depender de permissão de tabela
          # (a REST API cai em 401 por RLS no papel anon). Basta gerar tráfego
          # pra evitar o auto-pause de ~7 dias do plano free.
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://liusarieisbuslzbftet.supabase.co/auth/v1/health" \
            -H "apikey: $SUPABASE_ANON_KEY")
          echo "HTTP $code"
          test "$code" = "200"
        env:
          SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxpdXNhcmllaXNidXNsemJmdGV0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwMjMzMjEsImV4cCI6MjA5NjU5OTMyMX0.PT-VTCia_UlW3EH-zyPkZftwVCqog5FVn7QDM6ImIcE
